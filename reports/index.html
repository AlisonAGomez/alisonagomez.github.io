<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <base href="../" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Estudos & Relatórios | Alison Gomez</title>

  <meta name="description" content="Catálogo e detalhes de estudos técnicos, resposta a incidentes e documentação operacional de Alison Gomez." />

  <link rel="icon" type="image/png" href="assets/img/favicon.png" />
  <link rel="stylesheet" href="style.css?v=42" />
</head>

<body>
  <canvas id="matrixCanvas" aria-hidden="true"></canvas>
  <div class="scanline" aria-hidden="true"></div>
  <div class="noise" aria-hidden="true"></div>

  <header class="topbar">
    <a href="./#home" class="brand"><span>[</span> ALISON GOMEZ <span>]</span></a>

    <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu">
      <span></span><span></span><span></span>
    </button>

    <nav class="nav" id="nav">
      <a href="./#home">./home</a>
      <a href="./#estudos">./estudos</a>
      <a href="reports/">./relatórios</a>
      <a href="./#automacoes">./automações</a>
      <a href="automations/">./scripts</a>
      <a href="./#contato">./contato</a>
    </nav>
  </header>

  <main class="section reports-page">
    <div id="reportsRoot"></div>
  </main>

  <footer class="footer">
    <p>ALISON GOMEZ © <span id="year"></span> // Estudos & Relatórios</p>
  </footer>

  <script src="script.js?v=42"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const reportId = params.get("id");
    const root = document.getElementById("reportsRoot");

    function list(items) {
      const safeItems = Array.isArray(items) ? items : [];
      if (!safeItems.length) return `<p>Informações em revisão.</p>`;
      return `<ul>${safeItems.map(item => `<li>${item}</li>`).join("")}</ul>`;
    }

    function tags(items) {
      const safeItems = Array.isArray(items) ? items : [];
      return `<div class="report-tags">${safeItems.map(item => `<span>${item}</span>`).join("")}</div>`;
    }

    function reportCard(report) {
      const cardTags = (report.tags || []).slice(0, 6).map(tag => `<span>${tag}</span>`).join("");

      return `
        <article class="report-list-card report-clean-card reveal visible">
          <div class="report-list-card-content">
            <div class="report-card-meta">
              <span class="report-status">${report.status || "Relatório Técnico"}</span>
              <span class="report-severity">${report.severity || "N/A"}</span>
            </div>

            <h3>${report.title}</h3>
            <p>${report.summary || report.subtitle || ""}</p>

            <div class="report-tags">${cardTags}</div>

            <div class="project-links">
              <a href="reports/?id=${report.id}">Ver estudo</a>
              <a href="${report.pdf}" target="_blank" rel="noreferrer">Baixar relatório</a>
            </div>
          </div>
        </article>
      `;
    }

    function renderCatalog(reports) {
      document.title = "Estudos & Relatórios | Alison Gomez";

      root.innerHTML = `
        <div class="section-head reveal visible">
          <span class="section-tag">// STUDIES_INDEX</span>
          <h2>Estudos & Relatórios</h2>
          <p class="section-subtitle">
            Estudos de caso, resposta a incidentes, análise técnica e documentação operacional para ambientes de infraestrutura, SOC e Blue Team.
          </p>
        </div>

        <div class="reports-grid-page">
          ${reports.map(reportCard).join("")}
        </div>
      `;
    }

    function renderReport(report) {
      const details = report.details || {};

      const overview = details.overview || report.summary || report.subtitle || "Estudo técnico em preparação.";
      const methodology = details.methodology || report.methodology || [];
      const findings = details.findings || report.findings || report.highlights || [];
      const actions = details.actions || report.actions || [];
      const mitre = details.mitre || report.mitre || [];
      const lessons = details.lessons || report.lessons || [];

      document.title = `${report.title} | Alison Gomez`;

      root.innerHTML = `
        <div class="report-detail-layout">
          <article>
            <section class="report-detail-panel">
              <span class="section-tag">// CASE_STUDY</span>
              <h1>${report.title}</h1>
              <p>${report.subtitle || report.summary || ""}</p>

              <div class="report-card-meta">
                <span class="report-badge">${report.type || "Estudo Técnico"}</span>
                <span class="report-severity">${report.severity || "N/A"}</span>
                <span class="report-status">${report.status || "Relatório Técnico"}</span>
                <span class="report-badge">${report.date || "Sem data"}</span>
              </div>

              ${tags(report.tags)}
            </section>

            <section class="report-detail-card">
              <h2>Visão geral</h2>
              <p>${overview}</p>
            </section>

            <section class="report-detail-card">
              <h2>Metodologia</h2>
              ${list(methodology)}
            </section>

            <section class="report-detail-card">
              <h2>Achados principais</h2>
              ${list(findings)}
            </section>

            <section class="report-detail-card">
              <h2>Ações de resposta</h2>
              ${list(actions)}
            </section>

            <section class="report-detail-card">
              <h2>MITRE ATT&CK</h2>
              ${list(mitre)}
            </section>

            <section class="report-detail-card">
              <h2>Lições aprendidas</h2>
              ${list(lessons)}
            </section>
          </article>

          <aside>
            <div class="report-aside-card">
              <h3>Relatório</h3>
              <p>Documento técnico com investigação, evidências, análise e recomendações do caso.</p>

              <div class="report-action-stack">
                <a href="${report.pdf}" target="_blank" rel="noreferrer">Baixar relatório</a>
                <a href="reports/">Voltar ao catálogo</a>
              </div>
            </div>

            <div class="report-aside-card">
              <h3>Resumo</h3>
              <p><strong>Severidade:</strong> ${report.severity || "N/A"}</p>
              <p><strong>Status:</strong> ${report.status || "Relatório Técnico"}</p>
              <p><strong>Tipo:</strong> ${report.type || "Estudo técnico"}</p>
              <p><strong>Data:</strong> ${report.date || "Sem data"}</p>
            </div>
          </aside>
        </div>
      `;
    }

    fetch("assets/reports/reports.json", { cache: "no-store" })
      .then(response => {
        if (!response.ok) throw new Error("HTTP " + response.status);
        return response.json();
      })
      .then(reports => {
        if (!Array.isArray(reports) || reports.length === 0) {
          root.innerHTML = `<div class="report-empty">Nenhum estudo cadastrado.</div>`;
          return;
        }

        if (reportId) {
          const report = reports.find(item => item.id === reportId) || reports[0];
          renderReport(report);
          return;
        }

        renderCatalog(reports);
      })
      .catch((error) => {
        root.innerHTML = `
          <div class="report-empty">
            Não foi possível carregar os estudos.<br>
            Verifique o arquivo <strong>assets/reports/reports.json</strong>.<br>
            Detalhe: ${error.message}
          </div>
        `;
      });
  </script>
</body>
</html>

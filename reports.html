<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Estudos & Relatórios | Alison Gomez</title>

  <meta name="description" content="Catálogo de estudos técnicos, resposta a incidentes e documentação operacional de Alison Gomez." />

  <link rel="icon" type="image/png" href="assets/img/favicon.png" />
  <link rel="stylesheet" href="style.css?v=34" />
</head>

<body>
  <canvas id="matrixCanvas" aria-hidden="true"></canvas>
  <div class="scanline" aria-hidden="true"></div>
  <div class="noise" aria-hidden="true"></div>

  <header class="topbar">
    <a href="./#home" class="brand"><span>[</span> ALISON GOMEZ <span>]</span></a>

    <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu">
      <span></span><span></span><span></span>
    </button>

    <nav class="nav" id="nav">
      <a href="./#home">./home</a>
      <a href="./#estudos">./estudos</a>
      <a href="reports/">./relatórios</a>
      <a href="./#automacoes">./automações</a>
      <a href="automations/">./scripts</a>
      <a href="./#contato">./contato</a>
    </nav>
  </header>

  <main class="section reports-page">
    <div class="section-head reveal visible">
      <span class="section-tag">// STUDIES_INDEX</span>
      <h2>Estudos & Relatórios</h2>
      <p class="section-subtitle">
        Estudos de caso, resposta a incidentes, análise técnica e documentação operacional para ambientes de infraestrutura, SOC e Blue Team.
      </p>
    </div>

    <div id="reportsGrid" class="reports-grid-page"></div>
  </main>

  <footer class="footer">
    <p>ALISON GOMEZ © <span id="year"></span> // Estudos & Relatórios</p>
  </footer>

  <script src="script.js?v=34"></script>

  <script>
    function reportCard(report) {
      const tags = (report.tags || []).slice(0, 6).map(tag => `<span>${tag}</span>`).join("");

      return `
        <article class="report-list-card report-clean-card reveal visible">
          <div class="report-list-card-content">
            <div class="report-card-meta">
              <span class="report-status">${report.status || "Relatório Técnico"}</span>
              <span class="report-severity">${report.severity || "N/A"}</span>
            </div>

            <h3>${report.title}</h3>
            <p>${report.summary || report.subtitle || ""}</p>

            <div class="report-tags">${tags}</div>

            <div class="project-links">
              <a href="report/?id=${report.id}">Ver estudo</a>
              <a href="${report.pdf}" target="_blank" rel="noreferrer">Baixar relatório</a>
            </div>
          </div>
        </article>
      `;
    }

    fetch("assets/reports/reports.json", { cache: "no-store" })
      .then(response => {
        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }

        return response.json();
      })
      .then(reports => {
        const grid = document.getElementById("reportsGrid");

        if (!Array.isArray(reports) || reports.length === 0) {
          grid.innerHTML = `<div class="report-empty">Nenhum estudo cadastrado.</div>`;
          return;
        }

        grid.innerHTML = reports.map(reportCard).join("");
      })
      .catch((error) => {
        document.getElementById("reportsGrid").innerHTML = `
          <div class="report-empty">
            Não foi possível carregar o catálogo de estudos.<br>
            Verifique o arquivo <strong>assets/reports/reports.json</strong>.<br>
            Detalhe: ${error.message}
          </div>
        `;
      });
  </script>
</body>
</html>

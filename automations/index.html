<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <base href="../" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Automações | Alison Gomez</title>

  <meta name="description" content="Catálogo e detalhes de scripts, automações e ferramentas técnicas de Alison Gomez." />

  <link rel="icon" type="image/png" href="assets/img/favicon.png" />
  <link rel="stylesheet" href="style.css?v=42" />
</head>

<body>
  <canvas id="matrixCanvas" aria-hidden="true"></canvas>
  <div class="scanline" aria-hidden="true"></div>
  <div class="noise" aria-hidden="true"></div>

  <header class="topbar">
    <a href="./#home" class="brand"><span>[</span> ALISON GOMEZ <span>]</span></a>
    <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu"><span></span><span></span><span></span></button>
    <nav class="nav" id="nav">
      <a href="./#home">./home</a>
      <a href="./#automacoes">./automações</a>
      <a href="automations/">./scripts</a>
      <a href="./#estudos">./estudos</a>
      <a href="reports/">./relatórios</a>
      <a href="./#contato">./contato</a>
    </nav>
  </header>

  <main class="section reports-page">
    <div id="automationsRoot"></div>
  </main>

  <footer class="footer"><p>ALISON GOMEZ © <span id="year"></span> // Automações</p></footer>

  <script src="script.js?v=42"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const automationId = params.get("id");
    const root = document.getElementById("automationsRoot");

    function list(items) {
      const safeItems = Array.isArray(items) ? items : [];

      if (!safeItems.length) {
        return `<p>Informações em revisão.</p>`;
      }

      return `<ul>${safeItems.map(item => `<li>${item}</li>`).join("")}</ul>`;
    }

    function tags(items) {
      const safeItems = Array.isArray(items) ? items : [];
      return `<div class="report-tags">${safeItems.map(item => `<span>${item}</span>`).join("")}</div>`;
    }

    function automationCard(item) {
      const cardTags = (item.tags || []).slice(0, 5).map(tag => `<span>${tag}</span>`).join("");
      const hasRepository = item.repository && item.repository !== "https://github.com/AlisonAGomez";
      const repositoryAction = hasRepository
        ? `<a href="${item.repository}" target="_blank" rel="noreferrer">${item.repositoryLabel || "GitHub"}</a>`
        : `<span class="link-disabled">Repositório em breve</span>`;

      return `
        <article class="report-list-card automation-list-card automation-clean-card standard-card">
          <div class="report-list-card-content">
            <div class="report-card-meta">
              <span class="report-status">${item.language}</span>
              <span class="report-severity">${item.status}</span>
            </div>

            <div class="card-main">
              <h3>${item.title}</h3>
              <p class="card-summary">${item.summary}</p>
            </div>

            <div class="report-tags">${cardTags}</div>

            <div class="project-links">
              <a href="automations/?id=${item.id}">Ver detalhes</a>
              ${repositoryAction}
            </div>
          </div>
        </article>
      `;
    }

    function gallery(items) {
      const safeItems = Array.isArray(items) ? items : [];

      if (!safeItems.length) {
        return "";
      }

      return `
        <section class="report-detail-card case-gallery-section">
          <h2>Imagens do projeto</h2>
          <div class="case-gallery">
            ${safeItems.map(image => `
              <figure class="case-gallery-item">
                <a href="${image.src}" target="_blank" rel="noreferrer">
                  <img src="${image.src}" alt="${image.alt || image.title}" loading="lazy" />
                </a>
                <figcaption>
                  <strong>${image.title}</strong>
                  <span>${image.description || ""}</span>
                </figcaption>
              </figure>
            `).join("")}
          </div>
        </section>
      `;
    }

    function optionalSection(title, itemsOrText) {
      if (!itemsOrText) return "";
      if (Array.isArray(itemsOrText) && !itemsOrText.length) return "";

      const content = Array.isArray(itemsOrText)
        ? list(itemsOrText)
        : `<p>${itemsOrText}</p>`;

      return `
        <section class="report-detail-card">
          <h2>${title}</h2>
          ${content}
        </section>
      `;
    }

    function customSections(sections) {
      if (!Array.isArray(sections) || !sections.length) {
        return "";
      }

      return sections.map(section => optionalSection(section.title, section.items || section.text)).join("");
    }

    function defaultSections(item) {
      const details = item.details || {};

      return `
        ${optionalSection("Problema identificado", details.problem)}
        ${optionalSection("Arquitetura da solução", details.architecture)}
        ${optionalSection("Auditoria Dropbox", details.dropbox)}
        ${optionalSection("Auditoria Proxmox", details.proxmox)}
        ${optionalSection("Regras e status", details.statusRules)}
        ${optionalSection("Funcionalidades", item.features)}
        ${optionalSection("Benefícios do projeto", details.benefits)}
        ${optionalSection("Resultado final", details.result)}
      `;
    }

    function renderCatalog(items) {
      document.title = "Automações | Alison Gomez";

      root.innerHTML = `
        <div class="section-head reveal visible">
          <span class="section-tag">// AUTOMATIONS_INDEX</span>
          <h2>Automações</h2>
          <p class="section-subtitle">Catálogo de scripts, ferramentas e automações para auditoria, infraestrutura, monitoramento, backup e operação técnica.</p>
        </div>

        <div class="reports-grid-page">
          ${items.map(automationCard).join("")}
        </div>
      `;
    }

    function renderAutomation(item) {
      const details = item.details || {};
      const sections = Array.isArray(details.sections) && details.sections.length
        ? customSections(details.sections)
        : defaultSections(item);
      const hasRepository = item.repository && item.repository !== "https://github.com/AlisonAGomez";
      const repositoryAction = hasRepository
        ? `<a href="${item.repository}" target="_blank" rel="noreferrer">${item.repositoryLabel || "GitHub"}</a>`
        : `<span class="link-disabled">Repositório em breve</span>`;

      document.title = `${item.title} | Alison Gomez`;

      root.innerHTML = `
        <div class="report-detail-layout">
          <article>
            <section class="report-detail-panel">
              <span class="section-tag">// AUTOMATION_DETAIL</span>
              <h1>${item.title}</h1>
              <p>${item.subtitle}</p>

              <div class="report-card-meta">
                <span class="report-status">${item.language}</span>
                <span class="report-severity">${item.status}</span>
                <span class="report-badge">${item.category}</span>
              </div>

              ${tags(item.tags)}
            </section>

            <section class="report-detail-card">
              <h2>Visão geral</h2>
              <p>${details.overview || item.summary}</p>
            </section>

            ${gallery(item.gallery)}
            ${sections}

            <section class="report-detail-card">
              <h2>Tecnologias usadas</h2>
              ${tags(item.tech)}
            </section>
          </article>

          <aside>
            <div class="report-aside-card">
              <h3>Dados da automação</h3>
              <p><strong>Categoria:</strong> ${item.category}</p>
              <p><strong>Linguagem:</strong> ${item.language}</p>
              <p><strong>Status:</strong> ${item.status}</p>
              <p><strong>Ano:</strong> ${item.date}</p>

              <div class="report-action-stack">
                ${repositoryAction}
                <a href="automations/">Voltar ao catálogo</a>
              </div>
            </div>

            <div class="report-aside-card">
              <h3>Impacto técnico</h3>
              <ul>
                <li>Padronização de rotinas operacionais.</li>
                <li>Redução de tarefas manuais repetitivas.</li>
                <li>Geração de evidências e relatórios.</li>
                <li>Apoio a suporte, infraestrutura e segurança defensiva.</li>
              </ul>
            </div>
          </aside>
        </div>
      `;
    }

    fetch("assets/automations/automations.json", { cache: "no-store" })
      .then(response => response.json())
      .then(items => {
        if (!Array.isArray(items) || items.length === 0) {
          root.innerHTML = `<div class="report-empty">Nenhuma automação cadastrada.</div>`;
          return;
        }

        if (automationId) {
          const item = items.find(entry => entry.id === automationId) || items[0];
          renderAutomation(item);
          return;
        }

        renderCatalog(items);
      })
      .catch(() => {
        root.innerHTML = `
          <div class="report-empty">Não foi possível carregar as automações. Verifique o arquivo assets/automations/automations.json.</div>
        `;
      });
  </script>
</body>
</html>
